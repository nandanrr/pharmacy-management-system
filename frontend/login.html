<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: url('https://img.freepik.com/free-photo/top-view-world-heart-day-with-copy-space_23-2148610465.jpg?uid=R201043790&ga=GA1.1.386544471.1728137686&semt=ais_hybrid&w=740') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    form {
      backdrop-filter: blur(12px);
      background-color: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.25);
      padding: 40px 50px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      width: 100%;
      max-width: 400px;
      color: #fff;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 28px;
      color: #000000;
      /*text-shadow: 1px 1px 2px #000;*/
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      background: rgba(255, 255, 255, 0.8);
      color: #333;
      transition: box-shadow 0.3s ease;
    }

    input:focus, select:focus {
      outline: none;
      box-shadow: 0 0 5px #5b9bd5;
    }

    button {
      width: 100%;
      background: #5b9bd5;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.3s ease, transform 0.2s;
    }

    button:hover {
      background: #4a8ac2;
      transform: translateY(-2px);
    }

    #msg {
      margin-top: 15px;
      text-align: center;
      font-weight: 500;
    }

    select {
      background: rgba(255, 255, 255, 0.8);
    }

    @media (max-width: 500px) {
      form {
        padding: 30px 20px;
      }

      h2 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <form id="loginForm">
    <h2>User Login</h2>
    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>

    <!-- Role selection dropdown -->
    <select id="role" required>
      <option value="" disabled selected>Select role</option>
      <option value="admin">Admin</option>
      <option value="cashier">Cashier</option>
    </select>

    <button type="submit">Login</button>
    <p id="msg"></p>
  </form>
<script>
  const form = document.getElementById('loginForm');
  form.addEventListener('submit', function (e) {
    e.preventDefault();

    const data = {
      username: document.getElementById('username').value.trim(),
      password: document.getElementById('password').value.trim(),
      role: document.getElementById('role').value
    };

    fetch('http://localhost:3000/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(result => {
      const msg = document.getElementById('msg');

      if (result.success) {
        // ✅ Store token and other info securely
        localStorage.setItem('token', result.token);
        localStorage.setItem('userRole', result.role);
        localStorage.setItem('username', result.user.username);

        msg.textContent = `Login successful. Welcome ${data.role}!`;
        msg.style.color = '#28a745';

        if (data.role === 'admin') {
          window.location.href = 'admin-dashboard.html';
        } else if (data.role === 'cashier') {
          window.location.href = 'cashier-dashboard.html';
        }
      } else {
        msg.textContent = 'Invalid username, password, or role';
        msg.style.color = '#f00';
      }
    })
    .catch(err => {
      document.getElementById('msg').textContent = 'Error connecting to server';
      document.getElementById('msg').style.color = '#f00';
      console.error('Login error:', err);
    });
  });
</script>

</body>
</html>
