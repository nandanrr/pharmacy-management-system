<!DOCTYPE html>
<html>
<head>
  <title>View Medicines</title>
  <style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 40px;
    background: url('https://img.freepik.com/free-photo/pharmacist-day-celebration-with-male-pharmacist_23-2151734672.jpg?uid=R201043790&ga=GA1.1.386544471.1728137686&semt=ais_hybrid&w=740') no-repeat center center fixed;
    background-size: cover;
    color: #fff;
  }

  h1 {
    text-align: center;
    margin-bottom: 30px;
    font-weight: bold;
    color: #ffffff;
    text-shadow: 1px 1px 4px #000;
  }

  table {
    width: 100%;
    max-width: 1000px;
    margin: 0 auto;
    border-collapse: collapse;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 12px;
    box-shadow: 0 4px 25px rgba(0, 0, 0, 0.2);
    overflow: hidden;
  }

  thead {
    backdrop-filter: none !important;
    -webkit-backdrop-filter: none !important;
    background: rgba(76, 175, 80, 0.95) !important;
  }

  thead th {
    font-weight: 600;
    color: #fff;
    text-shadow: 1px 1px 2px #000;
  }

  th, td {
    padding: 14px 18px;
    text-align: center;
    color: #000;
    font-weight: bold;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  }

  tbody tr:hover {
    background-color: rgba(255, 255, 255, 0.1);
  }

  tbody tr:last-child td {
    border-bottom: none;
  }

  tbody td[colspan] {
    text-align: center;
    font-style: italic;
    color: #ffffff;
    padding: 20px 0;
  }
</style>

</head>
<body>
  <h1>📋 Medicine List</h1>

  <table id="medicineTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Brand</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Expiry Date</th>
        <th>Supplier ID</th>
      </tr>
    </thead>
    <tbody>
      <!-- Data will be inserted here -->
    </tbody>
  </table>

<script>
  const role = localStorage.getItem('userRole');
  if (!role) {
    alert('Please login first.');
    window.location.href = 'login.html';
  }

  fetch('http://localhost:3000/medicines')
    .then(response => response.json())
    .then(data => {
      const uniqueMedicinesMap = new Map();
      data.forEach(med => {
        const key = med.id || med._id;
        uniqueMedicinesMap.set(key, med);
      });
      const uniqueMedicines = Array.from(uniqueMedicinesMap.values());

      const tbody = document.querySelector('#medicineTable tbody');
      tbody.innerHTML = '';

      if (uniqueMedicines.length === 0) {
        const row = document.createElement('tr');
        row.innerHTML = '<td colspan="7">No medicines found.</td>';
        tbody.appendChild(row);
      } else {
        uniqueMedicines.forEach(med => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${med.id || med._id || ''}</td>
            <td>${med.name}</td>
            <td>${med.brand}</td>
            <td>${med.price}</td>
            <td>${med.quantity}</td>
            <td>${med.expiry_date ? new Date(med.expiry_date).toLocaleDateString() : ''}</td>
            <td>${med.supplier_id}</td>
          `;
          tbody.appendChild(row);
        });
      }
    })
    .catch(error => {
      console.error('Error fetching medicines:', error);
      alert('Failed to load medicines');
    });
</script>

</body>
</html>
