<!DOCTYPE html>
<html>
<head>
  <title>Add Sale</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: url('https://img.freepik.com/premium-photo/pharmacist-prescribes-medicines-world-pharmacists-day_726473-2955.jpg?uid=R201043790&ga=GA1.1.386544471.1728137686&semt=ais_hybrid&w=740') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
    }

    h2 {
      text-align: center;
      color: #ffffff;
      text-decoration: underline;
      margin-bottom: 25px;
      font-size:50px;
      font-weight: 700;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
    }

    form {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 4px 25px rgba(0,0,0,0.2);
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    input[type="number"] {
      padding: 12px 15px;
      font-size: 16px;
      border: 2px solid #ddd;
      border-radius: 8px;
      background-color: rgba(255,255,255,0.9);
      transition: border-color 0.3s ease;
      outline: none;
    }

    input[type="number"]:focus {
      border-color: #007BFF;
      box-shadow: 0 0 5px rgba(0,123,255,0.5);
    }

    button {
      padding: 12px;
      font-size: 18px;
      font-weight: 600;
      color: white;
      background: linear-gradient(45deg, #007BFF, #0056b3);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: linear-gradient(45deg, #0056b3, #003f7f);
    }

    #msg {
      margin-top: 10px;
      text-align: center;
      font-size: 16px;
      color: #28a745;
      font-weight: 600;
      min-height: 24px;
    }
  </style>
</head>
<body>
  <div>
    <h2>New Sale</h2>
    <form id="saleForm">
      <input type="number" id="customer_id" placeholder="Customer ID" required><br>
      <input type="number" id="medicine_id" oninput="getRecommendations()" placeholder="Medicine ID" required><br>
      <input type="number" id="quantity_sold" placeholder="Quantity Sold" required><br>
      <button type="submit">Record Sale</button>
    </form>
    <p id="msg"></p>
  </div>

  <script>
    const form = document.getElementById('saleForm');
    form.addEventListener('submit', function (e) {
      e.preventDefault();

      const data = {
        customer_id: document.getElementById('customer_id').value,
        medicine_id: document.getElementById('medicine_id').value,
        quantity_sold: document.getElementById('quantity_sold').value
      };

      fetch('http://localhost:3000/sales', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      })
      .then(res => res.text())
      .then(msg => {
        document.getElementById('msg').textContent = msg;
        form.reset();
      });
    });
  </script>
  <div id="recommendations"></div>

<script>
async function getRecommendations() {
  const medId = document.getElementById("medicine_id").value;

  if (!medId) return;

  const res = await fetch(`/ai/recommend/${medId}`);
  const data = await res.json();

  let html = "<h4>💡 Recommended:</h4><ul>";

  data.forEach(m => {
    html += `<li>${m.name}</li>`;
  });

  html += "</ul>";

  document.getElementById("recommendations").innerHTML = html;
}
</script>
</body>
</html>
