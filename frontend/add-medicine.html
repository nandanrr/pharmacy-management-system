<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add New Medicine</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: url('https://img.freepik.com/free-photo/insurance-application_1098-18311.jpg?uid=R201043790&ga=GA1.1.386544471.1728137686&semt=ais_hybrid&w=740') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    form {
      background: rgba(255, 255, 255, 0.2); /* transparent white */
      backdrop-filter: blur(15px); /* glass effect */
      -webkit-backdrop-filter: blur(15px);
      padding: 30px 40px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      max-width: 400px;
      width: 100%;
      color: #000;
    }

    h2 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      background-color: rgba(255, 255, 255, 0.8);
    }

    input:focus {
      border-color: #3498db;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #3498db;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s;
      margin-top: 15px;
    }

    button:hover {
      background-color: #2980b9;
    }

    #msg {
      margin-top: 15px;
      text-align: center;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <form id="medicineForm">
    <h2>Add New Medicine</h2>
    <input type="text" id="name" placeholder="Name" required>
    <input type="text" id="brand" placeholder="Brand" required>
    <input type="number" step="0.01" id="price" placeholder="Price" required>
    <input type="number" id="quantity" placeholder="Quantity" required>
    <input type="date" id="expiry_date" placeholder="Expiry Date" required>
    <input type="number" id="supplier_id" placeholder="Supplier ID" required>
    <button type="submit">Add</button>
    <p id="msg"></p>
  </form>

  <script>
    document.getElementById('medicineForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const msg = document.getElementById('msg');
      msg.textContent = '';

      const data = {
        name: document.getElementById('name').value.trim(),
        brand: document.getElementById('brand').value.trim(),
        price: parseFloat(document.getElementById('price').value),
        quantity: parseInt(document.getElementById('quantity').value),
        expiry_date: document.getElementById('expiry_date').value,
        supplier_id: parseInt(document.getElementById('supplier_id').value)
      };

      if (!/^\d{4}-\d{2}-\d{2}$/.test(data.expiry_date)) {
        msg.textContent = '❌ Please select a valid expiry date.';
        msg.style.color = '#e74c3c';
        return;
      }

      try {
        const res = await fetch('http://localhost:3000/medicines', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await res.json();
        msg.textContent = result.message || 'Something went wrong.';
        msg.style.color = result.message?.startsWith('🔴') ? '#e74c3c' : '#27ae60';

      } catch (error) {
        console.error('Network error:', error);
        msg.textContent = 'Something went wrong.';
        msg.style.color = '#e74c3c';
      }
    });
  </script>
</body>
</html>
