<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Customer</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: url('https://img.freepik.com/free-photo/pharmacist-day-celebration-with-male-pharmacist_23-2151734669.jpg?uid=R201043790&ga=GA1.1.386544471.1728137686&semt=ais_hybrid&w=740') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    form {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
      color: #000;
    }

    h2 {
      text-align: center;
      color: #ffffff;
      font-weight:bold;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
      background: rgba(255, 255, 255, 0.8);
    }

    input:focus {
      border-color: #3498db;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #3498db;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s;
      margin-top: 10px;
    }

    button:hover {
      background-color: #2980b9;
    }

    #msg {
      margin-top: 15px;
      text-align: center;
      color: #27ae60;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <form id="customerForm">
    <h2>Add New Customer</h2>
    <input type="text" id="name" placeholder="Name" required>
    <input type="text" id="contact" placeholder="Contact" required>
    <input type="text" id="address" placeholder="Address" required>
    <button type="submit">Add Customer</button>
    <p id="msg"></p>
  </form>

  <script>
    const form = document.getElementById('customerForm');
    form.addEventListener('submit', function (e) {
      e.preventDefault();

      const data = {
        name: document.getElementById('name').value,
        contact: document.getElementById('contact').value,
        address: document.getElementById('address').value
      };

      fetch('http://localhost:3000/customers', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      })
      .then(res => res.text())
      .then(msg => {
        document.getElementById('msg').textContent = msg;
        form.reset();
      });
    });
  </script>
</body>
</html>
