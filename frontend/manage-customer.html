<!DOCTYPE html>
<html>
<head>
  <title>Manage Customers</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: url('https://img.freepik.com/premium-photo/pharmacist-customer-discussing-medication_223509-13783.jpg?uid=R201043790&ga=GA1.1.386544471.1728137686&semt=ais_hybrid&w=740') no-repeat center center fixed;
      background-size: cover;
      margin: 0;
      padding: 40px;
      color: #333;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      color: #ffffff;
      text-shadow: 1px 1px 3px #000;
    }

    img.icon {
      width: 30px;
      height: 30px;
    }

    table {
      border-collapse: separate;
      border-spacing: 0 10px;
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.25);
      border-radius: 12px;
      overflow: hidden;
    }

    thead tr {
      background-color: rgba(255, 255, 255, 0.8);
      color: rgb(0, 0, 0);
      font-weight: 600;
      font-size: 16px;
    }

    th, td {
      padding: 16px 20px;
      text-align: left;
      vertical-align: middle;
      background-color: rgba(255, 255, 255, 0.8);
      color: #000000;
      font-weight:bold;
      text-shadow: 0 1px 1px rgba(0,0,0,0.2);
    }

    tbody tr {
      background: rgba(255, 255, 255, 0.05);
      transition: background-color 0.3s ease;
    }

    tbody tr:hover {
      background-color: rgba(255, 255, 255, 0.15);
    }

    button {
      padding: 8px 14px;
      background-color: #e74c3c;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 6px;
      font-weight: 600;
      font-size: 14px;
      transition: background-color 0.25s ease;
      box-shadow: 0 2px 5px rgba(231, 76, 60, 0.4);
    }

    button:hover {
      background-color: #c0392b;
      box-shadow: 0 3px 8px rgba(192, 57, 43, 0.6);
    }
  </style>
</head>
<body>
  <h2><img src="https://cdn-icons-png.flaticon.com/512/1828/1828843.png" class="icon" alt="icon">Manage Customers</h2>
  
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Contact</th>
        <th>Address</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="customerTableBody">
    </tbody>
  </table>

  <script>
    function loadCustomers() {
      fetch('http://localhost:3000/customers')
        .then(res => res.json())
        .then(data => {
          const tbody = document.getElementById('customerTableBody');
          tbody.innerHTML = '';
          data.forEach(customer => {
            const row = `<tr>
                           <td>${customer.id}</td>
                           <td>${customer.name}</td>
                           <td>${customer.contact}</td>
                           <td>${customer.address}</td>
                           <td><button onclick="deleteCustomer(${customer.id})">Delete</button></td>
                         </tr>`;
            tbody.innerHTML += row;
          });
        });
    }

    function deleteCustomer(id) {
      if (confirm("Are you sure you want to delete this customer?")) {
        fetch(`http://localhost:3000/customers/${id}`, {
          method: 'DELETE'
        })
        .then(res => res.text())
        .then(msg => {
          alert(msg);
          loadCustomers();
        });
      }
    }

    loadCustomers();
  </script>
</body>
</html>
